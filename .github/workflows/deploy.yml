name: Deploy to server
on:
  push:
    branches:  ['main']

jobs:
  deploy-app:
    name: deploy application to server
    runs-on: ubuntu-latest
    steps:
      - name: 🚀deploy app
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}       #add ssh private key to github secrets
          script_stop: true
          envs: TAG
          script: |
            cd hng14
            git pull origin main
            npm install
            pm2 restart index.js
            echo "successfully deployed application at $(date)"